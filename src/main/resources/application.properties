# ── Database Connection ────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/sainadh_fertilizers?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sainadh@1754
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ──────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Server ─────────────────────────────────────────────────────────
server.port=8080

# ── Session Timeout (30 minutes) ───────────────────────────────────
server.servlet.session.timeout=30m

# ── Redis Configuration ───────────────────────────────────────────
# Redis is used as a caching layer to serve requests faster.
# Products, cart counts, and frequently accessed data are cached.
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ── Cache Configuration ───────────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# ── JWT Configuration ─────────────────────────────────────────────
# JWT is used for stateless API authentication (REST endpoints).
# The secret key is Base64-encoded and tokens expire in 24 hours.
app.jwt.secret=U2FpbmFkaEZlcnRpbGl6ZXJzQW5kUGVzdGljaWRlc1NlY3JldEtleUZvckpXVDIwMjU=
app.jwt.expiration-ms=86400000

# ── Logging ────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.sainadh=DEBUG