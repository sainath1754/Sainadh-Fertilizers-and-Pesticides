<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Store — Sainadh Fertilizers &amp; Pesticides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<!-- MAIN CONTENT -->
<main class="page-content">

    <h2 class="page-title">🏪 Product Store</h2>
    <p class="page-subtitle">Browse our collection of quality fertilizers and pesticides</p>

    <!-- Success message (after adding to cart) -->
    <div th:if="${successMsg}" class="alert alert-success">
        <span th:text="${successMsg}"></span>
    </div>

    <!-- Category Filter -->
    <div class="filter-bar">
        <a href="/store" class="filter-btn"
           th:classappend="${selectedCategory == 'ALL'} ? 'active' : ''">All Products</a>
        <a href="/store?category=FERTILIZER" class="filter-btn"
           th:classappend="${selectedCategory == 'FERTILIZER'} ? 'active' : ''">🌾 Fertilizers</a>
        <a href="/store?category=PESTICIDE" class="filter-btn"
           th:classappend="${selectedCategory == 'PESTICIDE'} ? 'active' : ''">🧪 Pesticides</a>
    </div>

    <!-- Product Grid -->
    <div class="product-grid">
        <div th:each="product : ${products}" class="product-card">
            <div class="product-icon" th:text="${product.imageUrl}">🌾</div>
            <div class="product-category-badge"
                 th:classappend="${product.category == 'FERTILIZER'} ? 'badge-fertilizer' : 'badge-pesticide'"
                 th:text="${product.category}">FERTILIZER</div>
            <h3 class="product-name" th:text="${product.name}">Product Name</h3>
            <p class="product-desc" th:text="${product.description}">Description</p>
            <div class="product-price">₹<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span></div>
            <div class="product-stock">
                In Stock: <span th:text="${product.stock}">0</span>
            </div>
            <form th:action="@{/store/add-to-cart}" method="post" class="add-to-cart-form">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <input type="number" name="quantity" value="1" min="1" max="10" class="qty-input"/>
                <button type="submit" class="btn-add-cart">Add to Cart</button>
            </form>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(products)}" class="empty-state">
        <p>No products found in this category.</p>
    </div>

</main>

<!-- FOOTER -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
