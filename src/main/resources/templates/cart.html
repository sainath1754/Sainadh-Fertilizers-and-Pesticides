<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cart — Sainadh Fertilizers &amp; Pesticides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<!-- MAIN CONTENT -->
<main class="page-content">

    <h2 class="page-title">🛒 Shopping Cart</h2>
    <p class="page-subtitle">Review your items before checkout</p>

    <!-- Messages -->
    <div th:if="${successMsg}" class="alert alert-success">
        <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger">
        <span th:text="${errorMsg}"></span>
    </div>

    <!-- Cart Table (when items exist) -->
    <div th:if="${cartItems != null and !cartItems.isEmpty()}" class="card">
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cartItems}">
                    <td class="cart-product-info">
                        <span class="cart-product-icon" th:text="${item.product.imageUrl}">🌾</span>
                        <span th:text="${item.product.name}">Product</span>
                    </td>
                    <td>₹<span th:text="${#numbers.formatDecimal(item.product.price, 1, 2)}">0.00</span></td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" class="qty-form">
                            <input type="hidden" name="cartItemId" th:value="${item.id}"/>
                            <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="50" class="qty-input"/>
                            <button type="submit" class="btn-update">Update</button>
                        </form>
                    </td>
                    <td class="subtotal-cell">
                        ₹<span th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 1, 2)}">0.00</span>
                    </td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" name="cartItemId" th:value="${item.id}"/>
                            <button type="submit" class="btn-remove">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Cart Footer -->
        <div class="cart-footer">
            <div class="cart-total">
                Total: <strong>₹<span th:text="${#numbers.formatDecimal(cartTotal, 1, 2)}">0.00</span></strong>
            </div>
            <div class="cart-actions">
                <a href="/store" class="btn-continue">Continue Shopping</a>
                <form th:action="@{/cart/checkout}" method="post" style="display:inline;">
                    <button type="submit" class="btn-checkout">Place Order</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Empty Cart -->
    <div th:if="${cartItems == null or cartItems.isEmpty()}" class="empty-state">
        <div class="empty-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Browse our store to find quality fertilizers and pesticides.</p>
        <a href="/store" class="btn-continue">Go to Store</a>
    </div>

</main>

<!-- FOOTER -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
