<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="noindex"/>  <!-- Don't index login page -->
    <title>Login — Sainadh Fertilizers & Pesticides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">🌿</div>
        <h1>Sainadh Fertilizers</h1>
        <p class="subtitle">& Pesticides Management Portal</p>

        <!-- Error / Success Messages -->
        <div th:if="${errorMsg}" class="alert alert-danger">
            <span th:text="${errorMsg}"></span>
        </div>
        <div th:if="${successMsg}" class="alert alert-success">
            <span th:text="${successMsg}"></span>
        </div>

        <!-- Login Form — CSRF token auto-injected by Thymeleaf + Spring Security -->
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="Enter your username"
                       autocomplete="username"
                       required
                       maxlength="50"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Enter your password"
                       autocomplete="current-password"
                       required/>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</div>
</body>
</html>
