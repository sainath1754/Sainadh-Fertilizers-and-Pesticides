<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="noindex"/>
    <title>Register — Sainadh Fertilizers &amp; Pesticides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">🌿</div>
        <h1>Create Account</h1>
        <p class="subtitle">Sainadh Fertilizers &amp; Pesticides</p>

        <!-- Error Message -->
        <div th:if="${errorMsg}" class="alert alert-danger">
            <span th:text="${errorMsg}"></span>
        </div>

        <!-- Register Form -->
        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       th:value="${username}"
                       placeholder="Choose a username"
                       autocomplete="username"
                       required
                       minlength="3"
                       maxlength="50"/>
            </div>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text"
                       id="fullName"
                       name="fullName"
                       th:value="${fullName}"
                       placeholder="Enter your full name"
                       autocomplete="name"
                       required/>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       th:value="${email}"
                       placeholder="Enter your email"
                       autocomplete="email"
                       required/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Min 6 characters"
                       autocomplete="new-password"
                       required
                       minlength="6"/>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       placeholder="Re-enter password"
                       autocomplete="new-password"
                       required/>
            </div>
            <button type="submit" class="btn-login">Register</button>
        </form>

        <p class="register-link">
            Already have an account? <a th:href="@{/login}">Sign in here</a>
        </p>
    </div>
</div>
</body>
</html>
